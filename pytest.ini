[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Repo-lokaler basetemp + Retention: vermeidet die Windows-WinError-5-Kollision der
# globalen %TEMP%-Rotation (Defender/OneDrive/Such-Index + GUI-subprocess-Handles).
addopts = -m "not slow" --basetemp=.pytest-tmp
tmp_path_retention_count = 3
markers =
    slow: vollständige Pipeline-Läufe auf Baseline-PDFs (~15-30 min pro PDF).
          Nur mit pytest -m slow ausführen, nicht im normalen Entwicklungs-Loop.
